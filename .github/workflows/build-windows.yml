name: build-windows

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ProcStudio.sln

      - name: Build
        run: dotnet build ProcStudio.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ProcStudio.sln --configuration Release --no-build --verbosity normal

      - name: Publish Desktop App
        run: >
          dotnet publish src/ProcStudio.App/ProcStudio.App.csproj
          --configuration Release
          --framework net8.0-windows10.0.19041.0
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishReadyToRun=true
          -o artifacts/publish/win-x64

      - name: Create Distribution Zip
        shell: pwsh
        run: Compress-Archive -Path artifacts/publish/win-x64/* -DestinationPath artifacts/ProcStudio-win-x64-self-contained.zip -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProcStudio-win-x64-self-contained
          path: artifacts/ProcStudio-win-x64-self-contained.zip
